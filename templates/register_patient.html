```html
{% extends "base.html" %}

{% block content %}

<div class="hero">

    <h1>Register New Patient</h1>

    <p>
        Create a new patient record for consultation and follow-up.
    </p>

</div>

<div class="form-card">

    {% if message %}

    <div class="alert-message">

        {{ message }}

    </div>

    <br>

    {% endif %}

    <form method="POST">

        <div class="form-row">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter Patient Name"
                    required>

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input
                    type="tel"
                    name="phone"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    minlength="10"
                    placeholder="10 Digit Mobile Number"
                    required>

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Age</label>

                <input
                    type="number"
                    name="age"
                    min="1"
                    max="120"
                    placeholder="Patient Age"
                    required>

            </div>

            <div class="form-group">

                <label>Gender</label>

                <select
                    name="gender"
                    required>

                    <option value="">
                        Select Gender
                    </option>

                    <option value="Male">
                        Male
                    </option>

                    <option value="Female">
                        Female
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

            </div>

        </div>

        <div class="form-group">

            <label>Blood Group</label>

            <select
                name="blood_group"
                required>

                <option value="">
                    Select Blood Group
                </option>

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>

            </select>

        </div>

        <br>

        <button
            type="submit"
            class="btn">

            <i class="fa-solid fa-user-plus"></i>
            Register Patient

        </button>

    </form>

</div>

{% endblock %}
```
